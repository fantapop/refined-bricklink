name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build and package extension
        run: npm run build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/out/refined-bricklink-${{ github.ref_name }}.zip
            build/out/refined-bricklink-${{ github.ref_name }}.zip.sha256
          body: |
            ## Installation

            **From source (this release):**
            1. Download `refined-bricklink-${{ github.ref_name }}.zip` below
            2. Unzip it
            3. Go to `chrome://extensions`, enable Developer mode
            4. Click **Load unpacked** and select the unzipped folder

            ## Integrity verification

            A SHA256 checksum is provided as `refined-bricklink-${{ github.ref_name }}.zip.sha256`.

            ```sh
            sha256sum -c refined-bricklink-${{ github.ref_name }}.zip.sha256
            ```

            ## Source verification

            This release was built directly from the tagged source:
            [`${{ github.ref_name }}`](https://github.com/${{ github.repository }}/tree/${{ github.ref_name }})

            To verify, clone the repo at that tag and run `npm run build` — the output should match the zip above.
